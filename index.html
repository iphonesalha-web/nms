<style>
  :root{
    --blue:#2E7DF6; --blue-dk:#1B5FD0; --blue-lt:#5AA0FF; --glow:rgba(46,125,246,.5);
    --purple:#7C4DFF; --bg:#060A14; --panel:#0F1828; --panel2:#152238;
    --line:#22304C; --txt:#EAF1FC; --muted:#8FA1C0; --wa:#25D366; --gold:#F5B942;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;line-height:1.6;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px}
  .btn{display:inline-flex;align-items:center;gap:10px;border-radius:14px;padding:15px 30px;
    font-size:17px;font-weight:800;cursor:pointer;border:none;transition:transform .15s,box-shadow .15s}
  .btn:hover{transform:translateY(-2px)}
  .btn-wa{background:var(--wa);color:#04310f;box-shadow:0 10px 30px rgba(37,211,102,.35)}
  .btn-ghost{background:transparent;color:var(--txt);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--blue)}

  .reveal{opacity:0;transform:translateY(26px);transition:opacity .6s ease, transform .6s ease}
  .reveal.in{opacity:1;transform:none}

  header{position:sticky;top:0;z-index:50;background:rgba(6,10,20,.85);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;gap:14px;padding:14px 0}
  .logo{font-size:22px;font-weight:900;letter-spacing:.5px}
  .logo .p{color:var(--blue)}
  .nav .sp{flex:1}
  .nav a.lnk{color:var(--muted);font-weight:600;font-size:14px;padding:8px 10px}
  .nav a.lnk:hover{color:var(--txt)}
  .nav .btn{padding:10px 18px;font-size:14px}
  .lang{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px}
  .lang button{background:transparent;border:none;color:var(--muted);font-weight:700;font-size:12px;
    padding:6px 10px;border-radius:8px;cursor:pointer}
  .lang button.on{background:var(--blue);color:#fff}
  @media(max-width:820px){.nav a.lnk{display:none}}

  .hero{position:relative;padding:80px 0 60px;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;
    background:radial-gradient(50% 55% at 70% 10%, var(--glow), transparent 70%);opacity:.55;z-index:0}
  .hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center}
  @media(max-width:900px){.hero-grid{grid-template-columns:1fr;text-align:center}}
  .badge-pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);
    color:var(--blue-lt);font-weight:700;font-size:13px;padding:7px 16px;border-radius:999px;margin-bottom:20px}
  .hero h1{font-size:clamp(30px,5.5vw,50px);font-weight:900;line-height:1.14;margin-bottom:18px}
  .hero h1 .p{color:var(--blue)}
  .hero p.sub{color:var(--muted);font-size:clamp(15px,2.2vw,18px);max-width:560px;margin-bottom:30px}
  @media(max-width:900px){.hero p.sub{margin-inline:auto}}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap}
  @media(max-width:900px){.hero-cta{justify-content:center}}
  .trust{margin-top:22px;color:var(--muted);font-size:13px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  @media(max-width:900px){.trust{justify-content:center}}
  .stars{color:var(--gold);letter-spacing:2px}

  .tv{perspective:1400px}
  .tv-frame{background:#0a0f1a;border:2px solid #1d2942;border-radius:18px;padding:10px;
    box-shadow:0 40px 80px rgba(0,0,0,.55),0 0 0 6px #05080f;transform:rotateY(-9deg) rotateX(3deg)}
  @media(max-width:900px){.tv-frame{transform:none}}
  .tv-screen{border-radius:12px;overflow:hidden;aspect-ratio:16/9;
    background:linear-gradient(150deg,#2b46d8,#5a3bd0 60%,#7c4dff)}
  .scr-top{display:flex;align-items:center;gap:8px;padding:12px 14px}
  .scr-logo{font-size:13px;font-weight:900;color:#fff}
  .scr-logo b{color:#bfe0ff}
  .scr-top .sp{flex:1}
  .scr-time{font-size:11px;color:#dfe8ff;opacity:.9}
  .scr-btns{display:flex;gap:6px;padding:0 14px 10px}
  .scr-btns i{height:16px;border-radius:5px;background:rgba(255,255,255,.16);flex:1;display:block}
  .scr-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:2px 14px 14px}
  .scr-card{aspect-ratio:1/1;border-radius:10px;background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center}
  .scr-card.act{background:rgba(255,255,255,.22);border-color:#fff;box-shadow:0 0 18px rgba(255,255,255,.35)}
  .scr-card svg{width:26px;height:26px;fill:#eaf1ff;opacity:.9}
  .scr-row{display:flex;gap:8px;padding:0 14px 16px}
  .scr-poster{width:52px;height:74px;border-radius:8px;position:relative;background:linear-gradient(160deg,#8ea0ff,#43308a)}
  .scr-poster .pg{position:absolute;right:5px;top:5px;width:20px;height:20px;border-radius:50%;
    background:conic-gradient(#B14BF4 0 62%,rgba(255,255,255,.25) 62% 100%);
    display:flex;align-items:center;justify-content:center}
  .scr-poster .pg span{background:#161042;border-radius:50%;width:13px;height:13px;display:flex;
    align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:800}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:56px}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:16px;padding:24px 16px;text-align:center}
  .stat .n{font-size:30px;font-weight:900;color:var(--blue-lt);line-height:1}
  .stat .l{color:var(--muted);font-size:13px;margin-top:8px}

  section{padding:64px 0}
  .sec-head{text-align:center;margin-bottom:44px}
  .sec-head h2{font-size:clamp(24px,4vw,36px);font-weight:900;margin-bottom:10px}
  .sec-head p{color:var(--muted);font-size:16px}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:18px;padding:26px;transition:border-color .2s,transform .2s}
  .card:hover{border-color:var(--blue);transform:translateY(-3px)}
  .card .ic{width:50px;height:50px;border-radius:12px;background:rgba(46,125,246,.14);
    display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:24px}
  .card h3{font-size:18px;font-weight:800;margin-bottom:8px}
  .card p{color:var(--muted);font-size:14px}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:720px){.steps{grid-template-columns:1fr}}
  .step{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px;text-align:center}
  .step .n{width:44px;height:44px;border-radius:50%;background:var(--blue);color:#fff;font-weight:900;
    font-size:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .step h3{font-size:17px;margin-bottom:8px}
  .step p{color:var(--muted);font-size:14px}

  .cmp{max-width:820px;margin:0 auto;border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .cmp table{width:100%;border-collapse:collapse}
  .cmp th,.cmp td{padding:15px 16px;text-align:center;font-size:14px;border-bottom:1px solid var(--line)}
  .cmp th{background:var(--panel2);font-weight:800}
  .cmp td.f,.cmp th.f{text-align:start;color:var(--txt);font-weight:600}
  .cmp .us{color:var(--blue-lt);font-weight:900}
  .cmp .them{color:var(--muted)}
  .cmp tr:last-child td{border-bottom:none}
  .cmp .yes{color:#39d98a;font-weight:900}
  .cmp .no{color:#e2637a;font-weight:900}

  .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:860px){.tgrid{grid-template-columns:1fr}}
  .tcard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:24px}
  .tcard .st{color:var(--gold);letter-spacing:2px;margin-bottom:12px}
  .tcard p{font-size:15px;margin-bottom:18px}
  .tcard .who{display:flex;align-items:center;gap:12px}
  .tcard .av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));
    display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff}
  .tcard .who b{display:block;font-size:14px}
  .tcard .who span{color:var(--muted);font-size:12px}

  .price-wrap{display:flex;justify-content:center}
  .price{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1.5px solid var(--blue);
    border-radius:24px;padding:44px 40px;text-align:center;max-width:430px;width:100%;
    box-shadow:0 24px 60px rgba(46,125,246,.18);position:relative}
  .price .tag{position:absolute;top:18px;left:50%;transform:translateX(-50%);background:var(--blue);
    color:#fff;font-size:12px;font-weight:800;padding:5px 16px;border-radius:999px}
  .price h3{font-size:20px;margin:26px 0 6px}
  .price .amt{font-size:64px;font-weight:900;line-height:1;color:var(--blue)}
  .price .amt small{font-size:22px;color:var(--muted);font-weight:700}
  .price .life{color:var(--muted);margin:6px 0 24px;font-weight:700}
  .price ul{list-style:none;text-align:start;margin:0 0 28px}
  .price li{padding:9px 0;border-bottom:1px solid var(--line);font-size:15px;display:flex;gap:10px;align-items:center}
  .price li:last-child{border-bottom:none}
  .price li .ck{color:var(--blue);font-weight:900}
  .price .btn{width:100%;justify-content:center}

  .faq{max-width:760px;margin:0 auto}
  details{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px}
  details summary{font-weight:700;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:12px}
  details summary::-webkit-details-marker{display:none}
  details summary::after{content:"+";color:var(--blue);font-size:22px;font-weight:900}
  details[open] summary::after{content:"−"}
  details p{color:var(--muted);margin-top:12px;font-size:14px}

  .cta-band{background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:24px;
    padding:52px 30px;text-align:center;margin:20px 0}
  .cta-band h2{font-size:clamp(22px,4vw,32px);font-weight:900;margin-bottom:12px}
  .cta-band p{opacity:.92;margin-bottom:26px;font-size:16px}
  .cta-band .btn-wa{background:#fff;color:var(--blue-dk)}

  footer{border-top:1px solid var(--line);padding:34px 0;text-align:center;color:var(--muted);font-size:13px}
  footer .logo{font-size:18px;margin-bottom:10px}

  .wa-float{position:fixed;bottom:22px;inset-inline-start:22px;z-index:60;background:var(--wa);color:#04310f;
    width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:30px;box-shadow:0 10px 30px rgba(37,211,102,.5);transition:transform .15s}
  .wa-float:hover{transform:scale(1.08)}
</style>
</head>

let LANG = "ar";
function setLang(l){
  LANG = l;
  const dict = I18N[l];
  document.documentElement.lang = l;
  document.documentElement.dir = dict._dir;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(dict[k] != null) el.textContent = dict[k];
  });
  document.querySelectorAll('.lang button').forEach(b=>{
    b.classList.toggle('on', b.getAttribute('data-lang')===l);
  });
  try{ localStorage.setItem('nms_lang', l); }catch(e){}
}
function order(){
  const msg = I18N[LANG].order_msg;
  window.open('https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank');
}
// init
(function(){
  let saved = 'ar';
  try{ saved = localStorage.getItem('nms_lang') || 'ar'; }catch(e){}
  setLang(saved);
  if (APK_URL && APK_URL.trim() !== ""){
    document.getElementById('apkBox').style.display = 'block';
    document.getElementById('apkLink').href = APK_URL;
  }
  const io = new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  }, {threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
})();
</script>
